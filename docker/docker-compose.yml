version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: med-family-pg
    environment:
      POSTGRES_DB: med_family
      POSTGRES_USER: med_user
      POSTGRES_PASSWORD: med_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: med-family-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
